name: Publish npm

on:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event_name }}-${{ github.ref || github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  publish-dev:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Prepare dev version
        id: version
        run: |
          version="$(npm run --silent publish:prepare-dev-version)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Prepared dev version: $version"

      - name: Verify packed files
        run: npm run pack:check

      - name: Publish to npm dev dist-tag
        run: npm publish --tag dev --provenance --access public

      - name: Summarize publish result
        run: |
          {
            echo "## npm dev publish"
            echo
            echo "- Package: @hagicode/skillsbase"
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Dist-tag: dev"
            echo "- Registry: npmjs.org"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-release:
    if: github.event_name == 'release' && github.event.action == 'published' && !github.event.release.prerelease && !github.event.release.draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Resolve stable release version
        id: version
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          version="$(node --input-type=module <<'EOF'
          const tagName = process.env.RELEASE_TAG_NAME ?? "";
          const match = tagName.match(/^v(?<major>0|[1-9]\d*)\.(?<minor>0|[1-9]\d*)\.(?<patch>0|[1-9]\d*)$/);

          if (!match?.groups) {
            console.error(`Release tags must use the stable vX.Y.Z format. Received: ${tagName}`);
            process.exit(1);
          }

          process.stdout.write(`${match.groups.major}.${match.groups.minor}.${match.groups.patch}`);
          EOF
          )"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved stable release version: $version"

      - name: Temporarily rewrite package.json version for stable publish
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";

          const packageJsonPath = "package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));

          packageJson.version = process.env.RELEASE_VERSION;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          EOF
          echo "Temporarily rewrote package.json to version $RELEASE_VERSION"

      - name: Verify release tag matches package version
        run: |
          version="$(npm run --silent publish:verify-release -- "${{ github.event.release.tag_name }}")"
          echo "Validated release version: $version"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify packed files
        run: npm run pack:check

      - name: Publish to npm latest dist-tag
        run: npm publish --tag latest --provenance --access public

      - name: Summarize publish result
        run: |
          {
            echo "## npm stable publish"
            echo
            echo "- Package: @hagicode/skillsbase"
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Dist-tag: latest"
            echo "- Release: ${{ github.event.release.html_url }}"
            echo "- Tag: ${{ github.event.release.tag_name }}"
            echo "- Registry: npmjs.org"
          } >> "$GITHUB_STEP_SUMMARY"
